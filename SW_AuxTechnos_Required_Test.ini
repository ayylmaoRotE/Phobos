; SW.AuxTechnos.Required Test Configuration
; This file demonstrates the new SW.AuxTechnos.Required parameter

[GP1_Bombardment]
; Standard SuperWeapon with SW.AuxTechnos.Required=false (default behavior)
; Cameo always visible, grayed when Construction Yard not present
SW.AuxTechnos=GACNST
SW.AuxTechnos.Required=false
CommanderPoints.Amount=-1

[GP2_Bombardment]
; SuperWeapon with SW.AuxTechnos.Required=true (new behavior)
; Cameo completely hidden until Construction Yard is built
SW.AuxTechnos=GACNST
SW.AuxTechnos.Required=true
CommanderPoints.Amount=-1

[GP3_Bombardment]
; SuperWeapon requiring multiple technos with Required=true
; Cameo hidden until player has either a Construction Yard OR War Factory
SW.AuxTechnos=GACNST,GAWEAP
SW.AuxTechnos.Required=true
CommanderPoints.Amount=-1

[GP4_Bombardment]
; SuperWeapon requiring specific unit with Required=true
; Cameo hidden until player builds a Grizzly Tank
SW.AuxTechnos=GTNK
SW.AuxTechnos.Required=true
CommanderPoints.Amount=-1

; Expected Behavior:
; - GP1_Bombardment: Always visible, grayed when no Construction Yard
; - GP2_Bombardment: Hidden until Construction Yard built, then appears normally
; - GP3_Bombardment: Hidden until Construction Yard OR War Factory built
; - GP4_Bombardment: Hidden until Grizzly Tank built

; This allows for "unlockable" SuperWeapons that remain completely hidden
; until their prerequisites are satisfied, providing a cleaner UI experience
; for progression-based gameplay mechanics.
