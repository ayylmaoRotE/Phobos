; SW.AuxTechnos Test Configuration
; This demonstrates the new SW.AuxTechnos feature implementation

[NUKSW]
; Nuclear Missile - requires any heavy tank to be available
SW.AuxTechnos=TNKD,HTNK,APOC

[IRONSW]
; Iron Curtain - requires any defensive unit
SW.AuxTechnos=GTGCAN,TESLA,FLAKT

[CHRONOSW]
; Chronosphere - requires any advanced unit or aircraft
SW.AuxTechnos=MTNK,DISK,ORCA,HIND

[PSYDOMSW]
; Psychic Dominator - requires Yuri or any psychic unit
SW.AuxTechnos=YURI,YURIPR,BRUTE

; Example usage:
; SW.AuxTechnos=TNKD,HTNK,APOC
; This means the SuperWeapon becomes available when the player owns ANY of:
; - Rhino Heavy Tank (TNKD)
; - Apocalypse Tank (HTNK)
; - Apocalypse Tank (APOC)
;
; The feature works with any TechnoType:
; - Infantry (e.g., YURI, E1, ENGINEER)
; - Units (e.g., TNKD, HTNK, HARV)
; - Aircraft (e.g., ORCA, HIND, DISK)
; - Buildings (e.g., GTGCAN, TESLA, NAHAND)
